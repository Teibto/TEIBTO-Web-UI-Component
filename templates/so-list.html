<!--
  so-list.html — Sales Order LIST page (main entry).

  Layout: list page pattern (decision guide §2).
  Row click → /so/form?id=<tranid>      (view mode)
  New button → /so/form?id=new          (create mode)

  Required window.__DATA__:
    orders     [{ id, tranid, customer, date, status, amount, salesrep }]
    customers  [{ value, label }]
    statuses   [{ value, label }]
    formUrl    base URL of /so/form
-->

<!-- ── 1. Page header ─────────────────────────────────────────── -->
<tbt-section>
  <div class="tbt-page-header">
    <div>
      <div class="tbt-page-header__title">Sales orders</div>
      <div class="tbt-page-header__subtitle">All sales orders across customers</div>
    </div>
    <tbt-badge id="hdr-count" variant="primary">0</tbt-badge>
  </div>
</tbt-section>

<!-- ── 2. Filters ─────────────────────────────────────────────── -->
<tbt-section title="Filters">
  <tbt-field-grid columns="3">
    <tbt-dropdown   id="f-customer" name="customer" label="Customer" searchable></tbt-dropdown>
    <tbt-date-range id="f-period"   name-from="from" name-to="to" label="Period"></tbt-date-range>
    <tbt-dropdown   id="f-status"   name="status"   label="Status"></tbt-dropdown>
  </tbt-field-grid>
</tbt-section>

<!-- ── 3. KPI strip ───────────────────────────────────────────── -->
<tbt-section title="Summary">
  <div class="tbt-stats-grid">
    <tbt-stat id="stat-total"    label="Total orders"     variant="primary" icon="sales-order"></tbt-stat>
    <tbt-stat id="stat-value"    label="Total value"      variant="success" icon="money"></tbt-stat>
    <tbt-stat id="stat-pending"  label="Pending approval" variant="warning" icon="pending"></tbt-stat>
    <tbt-stat id="stat-approved" label="Approved"         variant="info"    icon="approve"></tbt-stat>
  </div>
</tbt-section>

<!-- ── 4. Orders table ────────────────────────────────────────── -->
<tbt-section title="Orders">
  <div slot="actions" style="display:flex;align-items:center;gap:var(--tbt-space-3)">
    <tbt-search id="f-search" placeholder="Search SO no…" debounce="300"></tbt-search>
    <tbt-button id="new-btn" variant="primary" icon="add" size="sm">New sales order</tbt-button>
  </div>
  <tbt-table id="orders-table" paginate page-size="20" responsive max-height="420px" pref-key="so-list"></tbt-table>
</tbt-section>

<!-- ── 5. Action bar ──────────────────────────────────────────── -->
<div class="tbt-action-bar">
  <tbt-button id="export-btn" variant="primary"   icon="export">Export CSV</tbt-button>
  <tbt-button id="print-btn"  variant="secondary" icon="print">Print</tbt-button>
</div>

<script type="module">
  const d  = window.__DATA__;
  const rt = window.tbtPageRuntime;

  /* ── Filters ────────────────────────────────────────────── */
  const fCustomer = document.getElementById('f-customer');
  const fStatus   = document.getElementById('f-status');
  const fSearch   = document.getElementById('f-search');
  fCustomer.options = [{ value: '', label: 'All customers' }, ...d.customers];
  fStatus.options   = [{ value: '', label: 'All statuses' },  ...d.statuses];
  fCustomer.value = fStatus.value = '';

  /* ── KPI ────────────────────────────────────────────────── */
  function recomputeStats(rows) {
    const value     = rt.sumBy(rows, 'amount');
    const pending   = rows.filter(r => r.status === 'Pending approval').length;
    const approved  = rows.filter(r => r.status === 'Approved').length;
    document.getElementById('stat-total').value    = String(rows.length);
    document.getElementById('stat-value').value    = rt.currency(value);
    document.getElementById('stat-pending').value  = String(pending);
    document.getElementById('stat-approved').value = String(approved);
    document.getElementById('hdr-count').textContent = rows.length + ' orders';
  }

  /* ── Status badge HTML ──────────────────────────────────── */
  const STATUS_VARIANT = {
    Draft: 'warning', 'Pending approval': 'info', Approved: 'success', Rejected: 'danger',
  };
  const statusBadge = (s) => rt.badge(s, STATUS_VARIANT[s] || 'neutral');

  /* ── Table ──────────────────────────────────────────────── */
  const table = document.getElementById('orders-table');
  table.columns = [
    { key: 'no',          label: 'No.',         align: 'right', resizable: false },
    { key: 'tranid',      label: 'SO no.',      sortable: true, mobileTitle: true,
      href: row => `${d.formUrl}?id=${row.id}` },
    { key: 'customer',    label: 'Customer',    sortable: true },
    { key: 'date',        label: 'Date',        sortable: true },
    { key: 'salesrep',    label: 'Sales rep' },
    { key: 'amountText',  label: 'Amount',      align: 'right', sortable: true },
    { key: 'statusBadge', label: 'Status',      align: 'center', html: true },
    { key: 'actions',     label: 'Actions',     align: 'center', html: true, resizable: false },
  ];

  function renderRows(rows) {
    table.rows = rows.map((r, i) => ({
      ...r,
      no:          i + 1,
      amountText:  rt.currency(r.amount),
      statusBadge: statusBadge(r.status),
      actions:     rt.rowActions(r.id),
    }));
    recomputeStats(rows);
  }

  function applyFilter() {
    const c  = fCustomer.value;
    const st = fStatus.value;
    const q  = (fSearch.value || '').toLowerCase();
    const filtered = (d.orders || []).filter(r => {
      if (c  && r.customerId !== c) return false;
      if (st && r.status !== st)    return false;
      if (q  && !r.tranid.toLowerCase().includes(q)) return false;
      return true;
    });
    renderRows(filtered);
  }
  [fCustomer, fStatus].forEach(el => el.addEventListener('tbt-change', applyFilter));
  fSearch.addEventListener('tbt-search', applyFilter);
  applyFilter();

  /* ── Row click → view; icon actions → view/edit/delete ──── */
  table.addEventListener('tbt-row-click', (e) => {
    location.href = `${d.formUrl}?id=${e.detail.row.id}`;
  });
  rt.wireRowActions(table, {
    onView:   (id) => { location.href = `${d.formUrl}?id=${id}`; },
    onEdit:   (id) => { location.href = `${d.formUrl}?id=${id}&mode=edit`; },
    onDelete: async (id) => {
      const ds = await import('/sc/SuiteScripts/Teibto/ds/v1.42.1/dist/tbt-ds.min.js');
      const target = (d.orders || []).find(r => String(r.id) === String(id));
      const ok = await ds.confirm({
        title: 'Delete sales order?',
        message: `Permanently delete ${target?.tranid || id}?`,
        confirmLabel: 'Delete',
        variant: 'danger',
      });
      if (!ok) return;
      d.orders = d.orders.filter(r => String(r.id) !== String(id));
      applyFilter();
    },
  });

  /* ── New → create form ──────────────────────────────────── */
  document.getElementById('new-btn').addEventListener('click', () => {
    location.href = `${d.formUrl}?id=new`;
  });

  /* ── Action bar ─────────────────────────────────────────── */
  document.getElementById('export-btn').addEventListener('click', () => {
    const csv = ['SO no.,Customer,Date,Sales rep,Amount,Status', ...d.orders.map(r =>
      `"${r.tranid}","${r.customer}","${r.date}","${r.salesrep}",${r.amount},"${r.status}"`
    )].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'sales-orders-' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  document.getElementById('print-btn').addEventListener('click', () => window.print());
</script>
