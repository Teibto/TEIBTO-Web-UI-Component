<!--
  expense-claim.html — Employee expense claim entry.

  Layout (Teibto standard):
    Page header    — claim no + employee + total + status badge
    Filters        — employee / period / category / status
    Summary stats  — Total claimed / Approved / Pending / Reimbursable
    Expense lines  — tbt-table (action: Add expense → modal)
    Approval flow  — tbt-approval-flow
    Action bar     — Save draft / Submit / Cancel

  Required keys on window.__DATA__:
    claim          { id, employee, employeeId, period, status }
    lines          array of { id, date, category, categoryLabel, merchant, amount, billable, receipt, memo }
    categories     [{ value, label }]
    employees      [{ value, label }]
    statuses       [{ value, label }]
    approvalSteps  array
    restletUrl     string
-->

<!-- ── 1. Page header ─────────────────────────────────────────── -->
<tbt-section>
  <div class="tbt-page-header">
    <div>
      <div class="tbt-page-header__title">Expense claim · <span id="hdr-claimno"></span></div>
      <div class="tbt-page-header__subtitle"><span id="hdr-employee"></span> · <span id="hdr-period"></span></div>
    </div>
    <tbt-badge id="hdr-status" variant="warning">Draft</tbt-badge>
  </div>
</tbt-section>

<div class="tbt-page-alerts">
  <tbt-alert id="demo-alert" variant="warning" hidden>กำลังแสดงข้อมูลตัวอย่าง — ยังไม่ได้ติดตั้ง custom record (ดู netsuite/DEPLOY.md)</tbt-alert>
  <tbt-alert id="ok-alert"  variant="success" dismissible hidden></tbt-alert>
  <tbt-alert id="err-alert" variant="danger"  dismissible hidden></tbt-alert>
</div>

<!-- ── 2. Filters ─────────────────────────────────────────────── -->
<tbt-section title="Filters">
  <tbt-field-grid columns="4">
    <tbt-dropdown   id="f-employee" name="employee" label="Employee" required></tbt-dropdown>
    <tbt-date-range id="f-period"   name-from="from" name-to="to" label="Period"></tbt-date-range>
    <tbt-dropdown   id="f-category" name="category" label="Category"></tbt-dropdown>
    <tbt-dropdown   id="f-status"   name="status"   label="Status"></tbt-dropdown>
  </tbt-field-grid>
</tbt-section>

<!-- ── 3. Summary stats ───────────────────────────────────────── -->
<tbt-section title="Summary">
  <div class="tbt-stats-grid">
    <tbt-stat id="stat-total"   label="Total claimed"  variant="primary" icon="money"></tbt-stat>
    <tbt-stat id="stat-billed"  label="Billable"       variant="success" icon="invoice"></tbt-stat>
    <tbt-stat id="stat-pending" label="Pending review" variant="warning" icon="pending"></tbt-stat>
    <tbt-stat id="stat-reimb"   label="Reimbursable"   variant="info"    icon="payment"></tbt-stat>
  </div>
</tbt-section>

<!-- ── 4. Expense lines ───────────────────────────────────────── -->
<tbt-section title="Expense lines">
  <tbt-button slot="actions" id="add-line" variant="primary" icon="add" size="sm">Add expense</tbt-button>
  <tbt-table id="lines-table" paginate page-size="20" responsive max-height="380px"></tbt-table>
</tbt-section>

<!-- ── 5. Approval flow ───────────────────────────────────────── -->
<tbt-section title="Approval">
  <tbt-approval-flow id="approval-flow" orientation="horizontal"></tbt-approval-flow>
</tbt-section>

<!-- ── 6. Action bar ──────────────────────────────────────────── -->
<div class="tbt-action-bar">
  <tbt-button id="save-btn"   variant="primary"   icon="save">Save draft</tbt-button>
  <tbt-button id="submit-btn" variant="primary"   icon="submit">Submit for approval</tbt-button>
  <tbt-button id="cancel-btn" variant="ghost"     icon="cancel">Cancel</tbt-button>
</div>

<!-- ── 7. Add/Edit expense modal ──────────────────────────────── -->
<tbt-modal id="exp-modal" title="Add expense" variant="default">
  <tbt-form id="exp-form">
    <tbt-field-grid columns="2">
      <tbt-datepicker id="m-date"     name="date"     label="Date"     required></tbt-datepicker>
      <tbt-dropdown   id="m-category" name="category" label="Category" required></tbt-dropdown>
      <tbt-input      id="m-merchant" name="merchant" label="Merchant" required></tbt-input>
      <tbt-input      id="m-amount"   name="amount"   label="Amount (฿)" type="number" required></tbt-input>
      <tbt-toggle     id="m-billable" name="billable" label="Billable to client" label-on="Yes" label-off="No"></tbt-toggle>
      <tbt-input      id="m-receipt"  name="receipt"  label="Receipt URL" placeholder="https://…"></tbt-input>
      <tbt-textarea   id="m-memo"     name="memo"     label="Memo" rows="2"></tbt-textarea>
    </tbt-field-grid>
  </tbt-form>
  <div slot="footer" class="tbt-modal-actions">
    <tbt-button id="modal-delete" variant="danger"    icon="delete" style="margin-right:auto;display:none">Delete</tbt-button>
    <tbt-button id="modal-cancel" variant="secondary" icon="cancel">Cancel</tbt-button>
    <tbt-button id="modal-save"   variant="primary"   icon="save">Save expense</tbt-button>
  </div>
</tbt-modal>

<script type="module">
  const d  = window.__DATA__;
  const rt = window.tbtPageRuntime;

  /* ── Header ─────────────────────────────────────────────── */
  document.getElementById('hdr-claimno').textContent = d.claim.id;
  document.getElementById('hdr-employee').textContent= d.claim.employee;
  document.getElementById('hdr-period').textContent  = d.claim.period;
  rt.setStatusBadge(document.getElementById('hdr-status'), d.claim.status);

  /* ── Filters ────────────────────────────────────────────── */
  const fEmployee = document.getElementById('f-employee');
  const fCategory = document.getElementById('f-category');
  const fStatus   = document.getElementById('f-status');
  fEmployee.options = d.employees;
  fCategory.options = [{ value: '', label: 'All categories' }, ...d.categories];
  fStatus.options   = d.statuses;
  fEmployee.value = d.claim.employeeId;
  fCategory.value = '';
  fStatus.value   = d.claim.status;

  /* ── Stats ──────────────────────────────────────────────── */
  function recomputeStats(rows) {
    const total    = rt.sumBy(rows, 'amount');
    const billable = rt.sumBy(rows.filter(r => r.billable),  'amount');
    const pending  = rt.sumBy(rows.filter(r => !r.approved), 'amount');
    document.getElementById('stat-total').value   = rt.currency(total);
    document.getElementById('stat-billed').value  = rt.currency(billable);
    document.getElementById('stat-pending').value = rt.currency(pending);
    document.getElementById('stat-reimb').value   = rt.currency(total - billable);
  }

  /* ── Expense lines table ────────────────────────────────── */
  const table = document.getElementById('lines-table');
  table.columns = [
    { key: 'date',          label: 'Date',     sortable: true, mobileTitle: true },
    { key: 'categoryLabel', label: 'Category', sortable: true },
    { key: 'merchant',      label: 'Merchant' },
    { key: 'amountText',    label: 'Amount',   align: 'right', sortable: true },
    { key: 'billableText',  label: 'Billable', align: 'center' },
    { key: 'receiptText',   label: 'Receipt',  align: 'center', html: true },
    { key: 'memo',          label: 'Memo' },
  ];

  function renderLines(rows) {
    table.rows = rows.map(r => ({
      ...r,
      amountText:   rt.currency(r.amount),
      billableText: r.billable ? 'Yes' : 'No',
      receiptText:  r.receipt ? `<tbt-icon name="attach" size="sm" color="primary"></tbt-icon>` : '—',
    }));
    recomputeStats(rows);
  }
  renderLines(d.lines || []);

  /* ── Add/Edit modal ─────────────────────────────────────── */
  const modal      = document.getElementById('exp-modal');
  const mDate      = document.getElementById('m-date');
  const mCategory  = document.getElementById('m-category');
  const mMerchant  = document.getElementById('m-merchant');
  const mAmount    = document.getElementById('m-amount');
  const mBillable  = document.getElementById('m-billable');
  const mReceipt   = document.getElementById('m-receipt');
  const mMemo      = document.getElementById('m-memo');
  const modalDelete= document.getElementById('modal-delete');
  mCategory.options = d.categories;

  let editingId = null;

  function openModal(line) {
    modal.setAttribute('title', line ? 'Edit expense' : 'Add expense');
    if (line) {
      editingId = line.id;
      mDate.value     = line.date;
      mCategory.value = line.category;
      mMerchant.value = line.merchant;
      mAmount.value   = String(line.amount);
      mBillable.value = !!line.billable;
      mReceipt.value  = line.receipt || '';
      mMemo.value     = line.memo    || '';
      modalDelete.style.display = '';
    } else {
      editingId = null;
      mDate.value     = new Date().toISOString().slice(0, 10);
      mCategory.value = mMerchant.value = mAmount.value = mReceipt.value = mMemo.value = '';
      mBillable.value = false;
      modalDelete.style.display = 'none';
    }
    modal.open = true;
  }

  document.getElementById('add-line').addEventListener('click', () => openModal(null));

  table.addEventListener('tbt-row-click', (e) => {
    const orig = (d.lines || []).find(x => x.id === e.detail.row.id);
    if (orig) openModal(orig);
  });

  document.getElementById('modal-cancel').addEventListener('click', () => { modal.open = false; });

  document.getElementById('modal-save').addEventListener('click', () => {
    const category = d.categories.find(c => c.value === mCategory.value);
    const next = {
      id: editingId || ('EX-' + Date.now()),
      date: mDate.value,
      category: mCategory.value,
      categoryLabel: category?.label || '',
      merchant: mMerchant.value,
      amount: Number(mAmount.value || 0),
      billable: !!mBillable.value,
      receipt: mReceipt.value,
      memo: mMemo.value,
    };
    if (!next.date || !next.category || !next.merchant || !next.amount) return;
    const rows = d.lines.slice();
    const idx = rows.findIndex(r => r.id === editingId);
    if (idx >= 0) rows[idx] = next; else rows.push(next);
    d.lines = rows;
    renderLines(rows);
    modal.open = false;
  });

  modalDelete.addEventListener('click', () => {
    d.lines = d.lines.filter(r => r.id !== editingId);
    renderLines(d.lines);
    modal.open = false;
  });

  /* ── Approval flow ──────────────────────────────────────── */
  document.getElementById('approval-flow').steps = d.approvalSteps || [];

  /* ── Action bar ─────────────────────────────────────────── */
  async function submit(action, label) {
    rt.hideAlerts('ok-alert', 'err-alert');
    // Send the employee internal id (RESTlet writes a SELECT field), not the name.
    const claim = {
      id: d.claim.id, tranid: d.claim.tranid,
      employee: (fEmployee && fEmployee.value) || d.claim.employeeId,
      period: d.claim.period,
    };
    try {
      const res = await rt.post(d.restletUrl, { action, claim, lines: d.lines });
      if (res && res.status) rt.setStatusBadge(document.getElementById('hdr-status'), res.status);
      rt.showAlert('ok-alert', label + ' successful.');
    } catch (err) {
      rt.showAlert('err-alert', label + ' failed: ' + err.message);
    }
  }

  document.getElementById('save-btn').addEventListener('click',   () => submit('save',   'Save'));
  document.getElementById('submit-btn').addEventListener('click', () => submit('submit', 'Submit'));
  document.getElementById('cancel-btn').addEventListener('click', () => history.back());
</script>
