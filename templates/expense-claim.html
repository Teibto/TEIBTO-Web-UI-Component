<!--
  expense-claim.html — Employee expense claim (เบิกค่าใช้จ่าย) document page body.

  Layout (Teibto ERP document — NetSuite-style anatomy, RFC 0007):
    Page header   — claim no + status badge + summary strip (count/billable/reimburse/total)
    Action bar    — TOP, sticky: Submit / Save draft / Approve / Reject / Back
    Alerts        — success / error banners
    Document info — employee / period (edit)
    Subtabs       — รายการค่าใช้จ่าย (tbt-table + Add → modal) · การอนุมัติ

  Edit vs view: editable while status === 'Draft' or 'Rejected' (the state
  machine allows save/submit from Rejected). Submitted shows Approve / Reject;
  Approved / Paid are read-only.

  Required keys on window.__DATA__:
    claim          { id, tranid, employee, employeeId, period, status }
    lines          array of { id, date, category, categoryLabel, merchant, amount, billable, receipt, memo }
    categories     [{ value, label }]
    employees      [{ value, label }]
    approvalSteps  array
    restletUrl     string
    listUrl        string — blank claim form ("กลับ" fallback for direct links)
-->

<!-- ── 1. Page header: identity + status + summary strip (RFC 0007) ── -->
<tbt-section not-collapsible>
  <div class="tbt-page-header">
    <div>
      <div class="tbt-page-header__title">ใบเบิกค่าใช้จ่าย · <span id="hdr-tranid"></span>
        <tbt-badge id="hdr-status" variant="neutral">—</tbt-badge>
      </div>
      <div class="tbt-page-header__subtitle" id="hdr-subtitle"></div>
    </div>
    <div class="tbt-page-header__stats">
      <span class="tbt-page-header__stat">รายการ<b id="hdr-stat-count">0 รายการ</b></span>
      <span class="tbt-page-header__stat">เรียกเก็บลูกค้าได้<b id="hdr-stat-billable">฿0.00</b></span>
      <span class="tbt-page-header__stat">เบิกคืนพนักงาน<b id="hdr-stat-reimb">฿0.00</b></span>
      <span class="tbt-page-header__stat">ยอดเบิกรวม<b id="hdr-stat-total">฿0.00</b></span>
    </div>
  </div>
</tbt-section>

<!-- ── 2. Action bar — บนสุดแบบ NetSuite, sticky ระหว่าง scroll ── -->
<div class="tbt-action-bar tbt-action-bar--top">
  <tbt-button id="submit-btn"  variant="primary"   icon="submit">ส่งอนุมัติ</tbt-button>
  <tbt-button id="save-btn"    variant="secondary" icon="save">บันทึกร่าง</tbt-button>
  <tbt-button id="approve-btn" variant="primary"   icon="approve">อนุมัติ</tbt-button>
  <tbt-button id="reject-btn"  variant="danger"    icon="reject">ตีกลับ</tbt-button>
  <tbt-button id="back-btn"    variant="ghost"     icon="back">กลับ</tbt-button>
</div>

<div class="tbt-page-alerts">
  <tbt-alert id="demo-alert" variant="warning" hidden>กำลังแสดงข้อมูลตัวอย่าง — ยังไม่ได้ติดตั้ง custom record (ดู netsuite/DEPLOY.md)</tbt-alert>
  <tbt-alert id="ok-alert"  variant="success" dismissible hidden></tbt-alert>
  <tbt-alert id="err-alert" variant="danger"  dismissible hidden></tbt-alert>
</div>

<!-- ── 3. Document info ───────────────────────────────────────── -->
<tbt-section title="ข้อมูลใบเบิกค่าใช้จ่าย">
  <tbt-field-grid columns="3">
    <tbt-dropdown id="f-employee" name="employee" label="พนักงาน" placeholder="เลือกพนักงาน…" required></tbt-dropdown>
    <tbt-input    id="f-period"   name="period"   label="งวดที่เบิก" placeholder="เช่น พฤษภาคม 2569" required></tbt-input>
  </tbt-field-grid>
</tbt-section>

<!-- ── 4. Subtabs: รายการค่าใช้จ่าย / การอนุมัติ (RFC 0007) ── -->
<tbt-section not-collapsible>
  <tbt-tabs active="0">
    <tbt-tabs-panel label="รายการค่าใช้จ่าย">
      <div class="tbt-panel-toolbar">
        <tbt-button id="add-line" variant="primary" icon="add" size="sm">เพิ่มค่าใช้จ่าย</tbt-button>
      </div>
      <tbt-table id="lines-table" responsive max-height="380px" empty-message="ยังไม่มีรายการค่าใช้จ่าย — กด &quot;เพิ่มค่าใช้จ่าย&quot; เพื่อเริ่มรายการแรก"></tbt-table>
    </tbt-tabs-panel>
    <tbt-tabs-panel label="การอนุมัติ">
      <tbt-approval-flow id="approval-flow" orientation="horizontal"></tbt-approval-flow>
    </tbt-tabs-panel>
  </tbt-tabs>
</tbt-section>

<!-- ── 5. Add / edit expense modal ────────────────────────────── -->
<tbt-modal id="exp-modal" title="เพิ่มค่าใช้จ่าย" variant="default">
  <tbt-form id="exp-form">
    <tbt-field-grid columns="2">
      <tbt-datepicker id="m-date"     name="date"     label="วันที่"                required></tbt-datepicker>
      <tbt-dropdown   id="m-category" name="category" label="หมวดค่าใช้จ่าย" placeholder="เลือกหมวด…" required></tbt-dropdown>
      <tbt-input      id="m-merchant" name="merchant" label="ร้านค้า/ผู้ให้บริการ"  required></tbt-input>
      <tbt-input      id="m-amount"   name="amount"   label="จำนวนเงิน (฿)" type="number" required></tbt-input>
      <tbt-toggle     id="m-billable" name="billable" label="เรียกเก็บลูกค้าได้" label-on="ใช่" label-off="ไม่ใช่"></tbt-toggle>
      <tbt-input      id="m-receipt"  name="receipt"  label="ลิงก์ใบเสร็จ" placeholder="https://…"></tbt-input>
      <tbt-textarea   id="m-memo"     name="memo"     label="หมายเหตุ" rows="2"></tbt-textarea>
    </tbt-field-grid>
  </tbt-form>
  <div slot="footer" class="tbt-modal-actions">
    <tbt-button id="modal-delete" variant="danger"    icon="delete" style="margin-right:auto;display:none">ลบ</tbt-button>
    <tbt-button id="modal-cancel" variant="secondary" icon="cancel">ยกเลิก</tbt-button>
    <tbt-button id="modal-save"   variant="primary"   icon="save">บันทึก</tbt-button>
  </div>
</tbt-modal>

<script type="module">
  const d  = window.__DATA__;
  const rt = window.tbtPageRuntime;
  const v  = d.claim;

  if (d.demo) { const da = document.getElementById('demo-alert'); if (da) da.hidden = false; }

  const STATUS_LABEL = {
    Draft: 'ร่าง', Submitted: 'รออนุมัติ', Approved: 'อนุมัติแล้ว', Rejected: 'ตีกลับ', Paid: 'จ่ายแล้ว',
  };
  const STATUS_VARIANT = {
    Draft: 'warning', Submitted: 'info', Approved: 'success', Rejected: 'danger', Paid: 'success',
  };

  // State machine allows save/submit from Rejected too (fix → resubmit).
  const isEditable = (status) => status === 'Draft' || status === 'Rejected';
  const editable = isEditable(v.status);

  /* ── Header ─────────────────────────────────────────────── */
  function renderHeader() {
    document.getElementById('hdr-tranid').textContent = v.tranid || '(ใหม่)';
    // Compose the subtitle from the parts that exist — no dangling "·" on a
    // fresh form where employee/period are still empty.
    const parts = [];
    if (v.employee) parts.push(v.employee);
    if (v.period) parts.push('งวด ' + v.period);
    document.getElementById('hdr-subtitle').textContent = parts.join(' · ');
    const hdrStatus = document.getElementById('hdr-status');
    hdrStatus.textContent = STATUS_LABEL[v.status] || v.status || '—';
    hdrStatus.setAttribute('variant', STATUS_VARIANT[v.status] || 'neutral');
  }
  renderHeader();

  /* ── Document info ──────────────────────────────────────── */
  const fEmployee = document.getElementById('f-employee');
  const fPeriod   = document.getElementById('f-period');
  fEmployee.options = d.employees || [];
  fEmployee.value   = v.employeeId || '';
  fPeriod.value     = v.period || '';
  if (!editable) {
    [fEmployee, fPeriod].forEach(el => el.setAttribute('readonly', ''));
  }

  /* ── Stats ──────────────────────────────────────────────── */
  function recomputeStats(rows) {
    const total    = rt.sumBy(rows, 'amount');
    const billable = rt.sumBy(rows.filter(r => r.billable), 'amount');
    document.getElementById('hdr-stat-count').textContent    = String(rows.length) + ' รายการ';
    document.getElementById('hdr-stat-billable').textContent = rt.currency(billable);
    document.getElementById('hdr-stat-reimb').textContent    = rt.currency(total - billable);
    document.getElementById('hdr-stat-total').textContent    = rt.currency(total);
  }

  /* ── Expense lines table ────────────────────────────────── */
  const table = document.getElementById('lines-table');
  table.columns = [
    { key: 'date',          label: 'วันที่',              sortable: true, mobileTitle: true },
    { key: 'categoryLabel', label: 'หมวด',               sortable: true },
    { key: 'merchant',      label: 'ร้านค้า/ผู้ให้บริการ' },
    { key: 'amountText',    label: 'จำนวนเงิน',           align: 'right', sortable: true },
    { key: 'billableText',  label: 'เรียกเก็บลูกค้า',      align: 'center' },
    { key: 'receiptText',   label: 'ใบเสร็จ',             align: 'center', html: true },
    { key: 'memo',          label: 'หมายเหตุ' },
  ];

  function renderLines(rows) {
    table.rows = rows.map(r => ({
      ...r,
      amountText:   rt.currency(r.amount),
      billableText: r.billable ? 'ใช่' : '—',
      receiptText:  r.receipt ? `<tbt-icon name="attach" size="sm" color="primary"></tbt-icon>` : '—',
    }));
    recomputeStats(rows);
  }
  renderLines(d.lines || []);

  /* ── Add / edit modal ───────────────────────────────────── */
  const modal       = document.getElementById('exp-modal');
  const mDate       = document.getElementById('m-date');
  const mCategory   = document.getElementById('m-category');
  const mMerchant   = document.getElementById('m-merchant');
  const mAmount     = document.getElementById('m-amount');
  const mBillable   = document.getElementById('m-billable');
  const mReceipt    = document.getElementById('m-receipt');
  const mMemo       = document.getElementById('m-memo');
  const modalDelete = document.getElementById('modal-delete');
  mCategory.options = d.categories || [];
  let editingId = null;

  function openModal(line) {
    modal.setAttribute('title', line ? 'แก้ไขค่าใช้จ่าย' : 'เพิ่มค่าใช้จ่าย');
    if (line) {
      editingId = line.id;
      mDate.value     = line.date;
      mCategory.value = line.category;
      mMerchant.value = line.merchant;
      mAmount.value   = String(line.amount);
      mBillable.value = !!line.billable;
      mReceipt.value  = line.receipt || '';
      mMemo.value     = line.memo || '';
      modalDelete.style.display = '';
    } else {
      editingId = null;
      mDate.value     = new Date().toISOString().slice(0, 10);
      mCategory.value = mMerchant.value = mAmount.value = mReceipt.value = mMemo.value = '';
      mBillable.value = false;
      modalDelete.style.display = 'none';
    }
    modal.open = true;
  }

  document.getElementById('add-line').addEventListener('click', () => openModal(null));

  table.addEventListener('tbt-row-click', (e) => {
    if (!isEditable(v.status)) return;
    const orig = (d.lines || []).find(x => x.id === e.detail.row.id);
    if (orig) openModal(orig);
  });

  document.getElementById('modal-cancel').addEventListener('click', () => { modal.open = false; });

  document.getElementById('modal-save').addEventListener('click', () => {
    const category = (d.categories || []).find(c => c.value === mCategory.value);
    const next = {
      id: editingId || ('EX-' + Date.now()),
      date:          mDate.value,
      category:      mCategory.value,
      categoryLabel: (category && category.label) || '',
      merchant:      mMerchant.value,
      amount:        Number(mAmount.value || 0),
      billable:      !!mBillable.value,
      receipt:       mReceipt.value,
      memo:          mMemo.value,
    };
    if (!next.date || !next.category || !next.merchant || !next.amount) return;
    const rows = (d.lines || []).slice();
    const idx = rows.findIndex(r => r.id === editingId);
    if (idx >= 0) rows[idx] = next; else rows.push(next);
    d.lines = rows;
    renderLines(rows);
    modal.open = false;
  });

  modalDelete.addEventListener('click', () => {
    d.lines = (d.lines || []).filter(r => r.id !== editingId);
    renderLines(d.lines);
    modal.open = false;
  });

  /* ── Approval ───────────────────────────────────────────── */
  document.getElementById('approval-flow').steps = d.approvalSteps || [];

  /* ── Action bar — show only the buttons valid for this status ── */
  const show = (id, on) => { document.getElementById(id).style.display = on ? '' : 'none'; };
  function renderButtons() {
    const ed = isEditable(v.status);
    show('save-btn',    ed);
    show('submit-btn',  ed);
    show('add-line',    ed);
    show('approve-btn', v.status === 'Submitted');
    show('reject-btn',  v.status === 'Submitted');
  }
  renderButtons();

  function collect(action) {
    return {
      action,
      claim: {
        id: v.id,
        tranid:   v.tranid,
        employee: fEmployee.value,
        period:   fPeriod.value,
      },
      lines: d.lines || [],
    };
  }

  // Adopt the persisted identity/status returned by the RESTlet. Without this
  // the page keeps v.id = null after the first save, so a second "บันทึกร่าง"
  // CREATES A DUPLICATE record (same bug as bill receipt QA F1).
  function applySaved(res) {
    if (!res) return;
    if (res.id) v.id = res.id;
    if (res.tranid) v.tranid = res.tranid;
    if (res.status) v.status = res.status;
    renderHeader();
    document.title = 'Teibto ERP · ใบเบิกค่าใช้จ่าย' + (v.tranid ? ' · ' + v.tranid : '');
    if (v.id && !/[?&]id=/.test(location.search)) {
      history.replaceState(null, '', location.href + '&id=' + encodeURIComponent(v.id));
    }
    renderButtons();
  }

  async function submit(action, label) {
    rt.hideAlerts('ok-alert', 'err-alert');
    try {
      // First submit of a never-saved form: persist as draft first so the
      // backend transitions Draft → Submitted instead of rejecting "new".
      if (action === 'submit' && !v.id) {
        applySaved(await rt.post(d.restletUrl, collect('save')));
      }
      const res = await rt.post(d.restletUrl, collect(action));
      applySaved(res);
      rt.showAlert('ok-alert', label + 'สำเร็จ' + (v.tranid ? ' · ' + v.tranid : ''));
    } catch (err) {
      rt.showAlert('err-alert', label + 'ไม่สำเร็จ: ' + err.message);
    }
  }

  document.getElementById('save-btn').addEventListener('click',    () => submit('save',    'บันทึก'));
  document.getElementById('submit-btn').addEventListener('click',  () => submit('submit',  'ส่งอนุมัติ'));
  document.getElementById('approve-btn').addEventListener('click', () => submit('approve', 'อนุมัติ'));
  document.getElementById('reject-btn').addEventListener('click',  () => submit('reject',  'ตีกลับ'));
  document.getElementById('back-btn').addEventListener('click', () => {
    // Direct-link opens have no history to go back to — fall back to a blank
    // claim form (this module has no list page; the entry page is its landing).
    if (history.length > 1) history.back();
    else if (d.listUrl) location.href = d.listUrl;
  });
</script>
