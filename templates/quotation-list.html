<!-- quotation-list.html — Quotation list. -->

<tbt-section>
  <div class="tbt-page-header">
    <div>
      <div class="tbt-page-header__title">Quotations</div>
      <div class="tbt-page-header__subtitle">All quotations across customers</div>
    </div>
    <tbt-badge id="hdr-count" variant="primary">0</tbt-badge>
  </div>
</tbt-section>

<tbt-section title="Filters">
  <tbt-field-grid columns="3">
    <tbt-dropdown   id="f-customer" name="customer" label="Customer" searchable></tbt-dropdown>
    <tbt-date-range id="f-period"   name-from="from" name-to="to" label="Period"></tbt-date-range>
    <tbt-dropdown   id="f-status"   name="status"   label="Status"></tbt-dropdown>
  </tbt-field-grid>
</tbt-section>

<tbt-section title="Summary">
  <div class="tbt-stats-grid">
    <tbt-stat id="stat-total"   label="Total quotes"  variant="primary" icon="quotation"></tbt-stat>
    <tbt-stat id="stat-value"   label="Total value"   variant="success" icon="money"></tbt-stat>
    <tbt-stat id="stat-open"    label="Open"          variant="info"    icon="time"></tbt-stat>
    <tbt-stat id="stat-expired" label="Expired"       variant="danger"  icon="alert"></tbt-stat>
  </div>
</tbt-section>

<tbt-section title="Quotations">
  <div slot="actions" style="display:flex;align-items:center;gap:var(--tbt-space-3)">
    <tbt-search id="f-search" placeholder="Search quote no…" debounce="300"></tbt-search>
    <tbt-button id="new-btn" variant="primary" icon="add" size="sm">New quotation</tbt-button>
  </div>
  <tbt-table id="rec-table" paginate page-size="20" responsive max-height="420px" pref-key="quotation-list"></tbt-table>
</tbt-section>

<div class="tbt-action-bar">
  <tbt-button id="export-btn" variant="primary"   icon="export">Export CSV</tbt-button>
  <tbt-button id="print-btn"  variant="secondary" icon="print">Print</tbt-button>
</div>

<script type="module">
  import * as ds from '/sc/SuiteScripts/Teibto/ds/v1.45.1/dist/tbt-ds.min.js';
  const d = window.__DATA__;

  const TODAY = '2026-05-30';
  ds.initListPage({
    data: d,
    countNoun: 'quotes',
    filters: [
      { id: 'f-customer', field: 'customerId', options: d.customers, allLabel: 'All customers' },
      { id: 'f-status',   field: 'status',     options: d.statuses,  allLabel: 'All statuses' },
    ],
    searchText: (r) => r.tranid,
    statusVariant: { Draft: 'warning', Sent: 'info', Accepted: 'success', Rejected: 'danger', Expired: 'danger' },
    derive: (r, rt) => ({ amountText: rt.currency(r.amount) }),
    columns: [
      { key: 'no',          label: 'No.',        align: 'right', resizable: false },
      { key: 'tranid',      label: 'Quote no.',  sortable: true, mobileTitle: true,
        href: row => `${d.formUrl}?id=${row.id}` },
      { key: 'customer',    label: 'Customer',   sortable: true },
      { key: 'date',        label: 'Date',       sortable: true },
      { key: 'expirydate',  label: 'Expiry',     sortable: true },
      { key: 'amountText',  label: 'Amount',     align: 'right', sortable: true },
      { key: 'statusBadge', label: 'Status',     align: 'center', html: true },
      { key: 'actions',     label: 'Actions',    align: 'center', html: true, resizable: false },
    ],
    stats: [
      { id: 'stat-total',   value: (rows) => String(rows.length) },
      { id: 'stat-value',   value: (rows, rt) => rt.currency(rt.sumBy(rows, 'amount')) },
      { id: 'stat-open',    value: (rows) => String(rows.filter(r => r.status === 'Sent' && r.expirydate >= TODAY).length) },
      { id: 'stat-expired', value: (rows) => String(rows.filter(r => r.expirydate < TODAY && r.status !== 'Accepted' && r.status !== 'Rejected').length) },
    ],
    deleteNoun: 'quotation',
    deleteLabel: (r) => r.tranid,
    csv: {
      header: 'Quote no.,Customer,Date,Expiry,Amount,Status',
      row: (r) => `"${r.tranid}","${r.customer}","${r.date}","${r.expirydate}",${r.amount},"${r.status}"`,
      filename: 'quotations',
    },
  });
</script>
