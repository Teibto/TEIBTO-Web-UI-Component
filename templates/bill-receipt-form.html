<!--
  bill-receipt-form.html — Vendor bill receipt (รับวางบิล) document page body.

  Layout (Teibto ERP document — NetSuite-style anatomy, RFC 0007):
    Page header   — voucher no + status badge + summary strip (count/net/VAT/total)
    Action bar    — TOP, sticky: Submit / Save draft / Approve / Reject / Print / Back
    Alerts        — success / error banners
    Document info — vendor / receive date / due date / contact / reference (edit)
    Subtabs       — รายการใบแจ้งหนี้ (tbt-table + Add → modal) · การอนุมัติ · ประวัติ

  Edit vs view: editable only while status === 'Draft'. Submitted shows
  Approve / Reject; Approved / Paid are read-only.

  Required keys on window.__DATA__:
    voucher       { id, tranid, vendor, vendorId, receiveDate, dueDate, contact, reference, status }
    lines         array of { id, invoiceNo, invoiceDate, poNo, amount, vat, memo }
    vendors       [{ value, label }]
    vatRate       number — default VAT rate (e.g. 0.07)
    approvalSteps array
    auditEntries  array
    restletUrl    string
-->

<!-- ── 1. Page header: identity + status + summary strip (RFC 0007) ── -->
<tbt-section not-collapsible>
  <div class="tbt-page-header">
    <div>
      <div class="tbt-page-header__title">ใบวางบิล · <span id="hdr-tranid"></span>
        <tbt-badge id="hdr-status" variant="neutral">—</tbt-badge>
      </div>
      <div class="tbt-page-header__subtitle" id="hdr-subtitle"></div>
    </div>
    <div class="tbt-page-header__stats">
      <span class="tbt-page-header__stat">ใบแจ้งหนี้<b id="hdr-stat-count">0 ใบ</b></span>
      <span class="tbt-page-header__stat">ยอดก่อนภาษี<b id="hdr-stat-net">฿0.00</b></span>
      <span class="tbt-page-header__stat">ภาษีมูลค่าเพิ่ม<b id="hdr-stat-vat">฿0.00</b></span>
      <span class="tbt-page-header__stat">ยอดรวมสุทธิ<b id="hdr-stat-total">฿0.00</b></span>
    </div>
  </div>
</tbt-section>

<!-- ── 2. Action bar — บนสุดแบบ NetSuite, sticky ระหว่าง scroll ── -->
<div class="tbt-action-bar tbt-action-bar--top">
  <tbt-button id="submit-btn"  variant="primary"   icon="submit">ส่งตรวจรับ</tbt-button>
  <tbt-button id="save-btn"    variant="secondary" icon="save">บันทึกร่าง</tbt-button>
  <tbt-button id="approve-btn" variant="primary"   icon="approve">อนุมัติ</tbt-button>
  <tbt-button id="reject-btn"  variant="danger"    icon="reject">ตีกลับ</tbt-button>
  <tbt-button id="print-btn"   variant="secondary" icon="print">พิมพ์</tbt-button>
  <tbt-button id="back-btn"    variant="ghost"     icon="back">กลับ</tbt-button>
</div>

<div class="tbt-page-alerts">
  <tbt-alert id="demo-alert" variant="warning" hidden>กำลังแสดงข้อมูลตัวอย่าง — ยังไม่ได้ติดตั้ง custom record (ดู netsuite/DEPLOY.md)</tbt-alert>
  <tbt-alert id="ok-alert"  variant="success" dismissible hidden></tbt-alert>
  <tbt-alert id="err-alert" variant="danger"  dismissible hidden></tbt-alert>
</div>

<!-- ── 3. Document info ───────────────────────────────────────── -->
<tbt-section title="ข้อมูลใบวางบิล">
  <tbt-field-grid columns="3">
    <tbt-dropdown   id="f-vendor"  name="vendor"    label="ผู้จำหน่าย" placeholder="เลือกผู้จำหน่าย…" required></tbt-dropdown>
    <tbt-datepicker id="f-receive" name="receive"   label="วันที่รับวางบิล" required></tbt-datepicker>
    <tbt-datepicker id="f-due"     name="due"       label="ครบกำหนดชำระ" required></tbt-datepicker>
    <tbt-input      id="f-contact" name="contact"   label="ผู้นำส่งบิล"></tbt-input>
    <tbt-input      id="f-ref"     name="reference" label="เลขที่อ้างอิง"></tbt-input>
  </tbt-field-grid>
</tbt-section>

<!-- ── 4. Subtabs: รายการใบแจ้งหนี้ / การอนุมัติ / ประวัติ (RFC 0007) ── -->
<tbt-section not-collapsible>
  <tbt-tabs active="0">
    <tbt-tabs-panel label="รายการใบแจ้งหนี้">
      <div class="tbt-panel-toolbar">
        <tbt-button id="add-line" variant="primary" icon="add" size="sm">เพิ่มใบแจ้งหนี้</tbt-button>
      </div>
      <tbt-table id="lines-table" responsive max-height="380px" empty-message="ยังไม่มีใบแจ้งหนี้ — กด &quot;เพิ่มใบแจ้งหนี้&quot; เพื่อเริ่มรายการแรก"></tbt-table>
    </tbt-tabs-panel>
    <tbt-tabs-panel label="การอนุมัติ">
      <tbt-approval-flow id="approval-flow" orientation="horizontal"></tbt-approval-flow>
    </tbt-tabs-panel>
    <tbt-tabs-panel label="ประวัติ">
      <tbt-audit-log id="audit-log" max-height="320px" empty-message="ยังไม่มีประวัติการทำรายการ"></tbt-audit-log>
    </tbt-tabs-panel>
  </tbt-tabs>
</tbt-section>

<!-- ── 8. Add / edit invoice modal ────────────────────────────── -->
<tbt-modal id="inv-modal" title="เพิ่มใบแจ้งหนี้" variant="default">
  <tbt-form id="inv-form">
    <tbt-field-grid columns="2">
      <tbt-input      id="m-invno"  name="invoiceNo"   label="เลขที่ใบแจ้งหนี้" required></tbt-input>
      <tbt-datepicker id="m-invdate" name="invoiceDate" label="วันที่ใบแจ้งหนี้" required></tbt-datepicker>
      <tbt-input      id="m-pono"   name="poNo"        label="เลขที่ PO อ้างอิง"></tbt-input>
      <tbt-input      id="m-amount" name="amount"      label="ยอดก่อนภาษี (฿)" type="number" required></tbt-input>
      <tbt-input      id="m-vat"    name="vat"         label="ภาษีมูลค่าเพิ่ม (฿)" type="number"></tbt-input>
      <tbt-textarea   id="m-memo"   name="memo"        label="หมายเหตุ" rows="2"></tbt-textarea>
    </tbt-field-grid>
  </tbt-form>
  <div slot="footer" class="tbt-modal-actions">
    <tbt-button id="modal-delete" variant="danger"    icon="delete" style="margin-right:auto;display:none">ลบ</tbt-button>
    <tbt-button id="modal-cancel" variant="secondary" icon="cancel">ยกเลิก</tbt-button>
    <tbt-button id="modal-save"   variant="primary"   icon="save">บันทึก</tbt-button>
  </div>
</tbt-modal>

<script type="module">
  const d  = window.__DATA__;
  const rt = window.tbtPageRuntime;
  const v  = d.voucher;

  if (d.demo) { const da = document.getElementById('demo-alert'); if (da) da.hidden = false; }
  const vatRate = d.vatRate == null ? 0.07 : d.vatRate;

  const STATUS_LABEL = {
    Draft: 'ร่าง', Submitted: 'รอตรวจรับ', Approved: 'อนุมัติแล้ว', Rejected: 'ตีกลับ', Paid: 'ชำระแล้ว',
  };
  const STATUS_VARIANT = {
    Draft: 'warning', Submitted: 'info', Approved: 'success', Rejected: 'danger', Paid: 'success',
  };

  const editable = v.status === 'Draft';
  const lineTotal = (r) => Number(r.amount || 0) + Number(r.vat || 0);

  /* ── Header ─────────────────────────────────────────────── */
  function renderHeader() {
    document.getElementById('hdr-tranid').textContent = v.tranid || '(ใหม่)';
    // Compose the subtitle from the parts that exist — no dangling "· รับเมื่อ"
    // on a fresh form where vendor/date are still empty.
    const parts = [];
    if (v.vendor) parts.push(v.vendor);
    if (v.receiveDate) parts.push('รับเมื่อ ' + v.receiveDate);
    document.getElementById('hdr-subtitle').textContent = parts.join(' · ');
    const hdrStatus = document.getElementById('hdr-status');
    hdrStatus.textContent = STATUS_LABEL[v.status] || v.status || '—';
    hdrStatus.setAttribute('variant', STATUS_VARIANT[v.status] || 'neutral');
  }
  renderHeader();

  /* ── Document info ──────────────────────────────────────── */
  const fVendor  = document.getElementById('f-vendor');
  const fReceive = document.getElementById('f-receive');
  const fDue     = document.getElementById('f-due');
  const fContact = document.getElementById('f-contact');
  const fRef     = document.getElementById('f-ref');
  fVendor.options = d.vendors || [];
  fVendor.value   = v.vendorId || '';
  fReceive.value  = v.receiveDate || '';
  fDue.value      = v.dueDate || '';
  fContact.value  = v.contact || '';
  fRef.value      = v.reference || '';
  if (!editable) {
    [fVendor, fReceive, fDue, fContact, fRef].forEach(el => el.setAttribute('readonly', ''));
  }

  /* ── Stats ──────────────────────────────────────────────── */
  function recomputeStats(rows) {
    const net = rt.sumBy(rows, 'amount');
    const vat = rt.sumBy(rows, 'vat');
    document.getElementById('hdr-stat-count').textContent = String(rows.length) + ' ใบ';
    document.getElementById('hdr-stat-net').textContent   = rt.currency(net);
    document.getElementById('hdr-stat-vat').textContent   = rt.currency(vat);
    document.getElementById('hdr-stat-total').textContent = rt.currency(net + vat);
  }

  /* ── Bill lines table ───────────────────────────────────── */
  const table = document.getElementById('lines-table');
  table.columns = [
    { key: 'invoiceNo',   label: 'เลขที่ใบแจ้งหนี้', sortable: true, mobileTitle: true },
    { key: 'invoiceDate', label: 'วันที่',           sortable: true },
    { key: 'poNo',        label: 'PO อ้างอิง' },
    { key: 'amountText',  label: 'ยอดก่อนภาษี',      align: 'right', sortable: true },
    { key: 'vatText',     label: 'ภาษี',             align: 'right' },
    { key: 'totalText',   label: 'รวม',              align: 'right' },
    { key: 'memo',        label: 'หมายเหตุ' },
  ];

  function renderLines(rows) {
    table.rows = rows.map(r => ({
      ...r,
      amountText: rt.currency(r.amount),
      vatText:    rt.currency(r.vat),
      totalText:  rt.currency(lineTotal(r)),
    }));
    recomputeStats(rows);
  }
  renderLines(d.lines || []);

  /* ── Add / edit modal ───────────────────────────────────── */
  const modal       = document.getElementById('inv-modal');
  const mInvNo      = document.getElementById('m-invno');
  const mInvDate    = document.getElementById('m-invdate');
  const mPoNo       = document.getElementById('m-pono');
  const mAmount     = document.getElementById('m-amount');
  const mVat        = document.getElementById('m-vat');
  const mMemo       = document.getElementById('m-memo');
  const modalDelete = document.getElementById('modal-delete');
  let editingId = null;

  // Auto-fill VAT from the pre-tax amount when the VAT field is left untouched.
  mAmount.addEventListener('tbt-input', () => {
    if (!mVat.dataset.touched) {
      mVat.value = String(Math.round(Number(mAmount.value || 0) * vatRate * 100) / 100);
    }
  });
  mVat.addEventListener('tbt-input', () => { mVat.dataset.touched = '1'; });

  function openModal(line) {
    modal.setAttribute('title', line ? 'แก้ไขใบแจ้งหนี้' : 'เพิ่มใบแจ้งหนี้');
    delete mVat.dataset.touched;
    if (line) {
      editingId = line.id;
      mInvNo.value   = line.invoiceNo;
      mInvDate.value = line.invoiceDate;
      mPoNo.value    = line.poNo || '';
      mAmount.value  = String(line.amount);
      mVat.value     = String(line.vat);
      mMemo.value    = line.memo || '';
      mVat.dataset.touched = '1';
      modalDelete.style.display = '';
    } else {
      editingId = null;
      mInvNo.value = mPoNo.value = mAmount.value = mVat.value = mMemo.value = '';
      mInvDate.value = new Date().toISOString().slice(0, 10);
      modalDelete.style.display = 'none';
    }
    modal.open = true;
  }

  document.getElementById('add-line').addEventListener('click', () => openModal(null));

  table.addEventListener('tbt-row-click', (e) => {
    if (!editable) return;
    const orig = (d.lines || []).find(x => x.id === e.detail.row.id);
    if (orig) openModal(orig);
  });

  document.getElementById('modal-cancel').addEventListener('click', () => { modal.open = false; });

  document.getElementById('modal-save').addEventListener('click', () => {
    const next = {
      id: editingId || ('IV-' + Date.now()),
      invoiceNo:   mInvNo.value,
      invoiceDate: mInvDate.value,
      poNo:        mPoNo.value,
      amount:      Number(mAmount.value || 0),
      vat:         Number(mVat.value || 0),
      memo:        mMemo.value,
    };
    if (!next.invoiceNo || !next.invoiceDate || !next.amount) return;
    const rows = (d.lines || []).slice();
    const idx = rows.findIndex(r => r.id === editingId);
    if (idx >= 0) rows[idx] = next; else rows.push(next);
    d.lines = rows;
    renderLines(rows);
    modal.open = false;
  });

  modalDelete.addEventListener('click', () => {
    d.lines = (d.lines || []).filter(r => r.id !== editingId);
    renderLines(d.lines);
    modal.open = false;
  });

  /* ── Approval + history ─────────────────────────────────── */
  document.getElementById('approval-flow').steps  = d.approvalSteps || [];
  document.getElementById('audit-log').entries     = d.auditEntries  || [];

  /* ── Action bar — show only the buttons valid for this status ── */
  const show = (id, on) => { document.getElementById(id).style.display = on ? '' : 'none'; };
  show('save-btn',    editable);
  show('submit-btn',  editable);
  show('add-line',    editable);
  show('approve-btn', v.status === 'Submitted');
  show('reject-btn',  v.status === 'Submitted');

  function collect(action) {
    return {
      action,
      voucher: {
        id: v.id,
        vendor:      fVendor.value,
        receiveDate: fReceive.value,
        dueDate:     fDue.value,
        contact:     fContact.value,
        reference:   fRef.value,
      },
      lines: d.lines || [],
    };
  }

  // Adopt the persisted identity/status returned by the RESTlet. Without this
  // the page keeps v.id = null after the first save, so a second "บันทึกร่าง"
  // CREATES A DUPLICATE record (QA F1) and "ส่งตรวจรับ" hits the backend in
  // status "new".
  function applySaved(res) {
    if (!res) return;
    if (res.id) v.id = res.id;
    if (res.tranid) v.tranid = res.tranid;
    if (res.status) v.status = res.status;
    renderHeader();
    document.title = 'Teibto ERP · ใบวางบิล' + (v.tranid ? ' · ' + v.tranid : '');
    if (v.id && !/[?&]id=/.test(location.search)) {
      history.replaceState(null, '', location.href + '&id=' + encodeURIComponent(v.id));
    }
    // Re-evaluate which action buttons this status allows.
    const nowEditable = v.status === 'Draft';
    show('save-btn',    nowEditable);
    show('submit-btn',  nowEditable);
    show('add-line',    nowEditable);
    show('approve-btn', v.status === 'Submitted');
    show('reject-btn',  v.status === 'Submitted');
  }

  async function submit(action, label) {
    rt.hideAlerts('ok-alert', 'err-alert');
    try {
      // First submit of a never-saved form: persist as draft first so the
      // backend transitions Draft → Submitted instead of rejecting "new".
      if (action === 'submit' && !v.id) {
        applySaved(await rt.post(d.restletUrl, collect('save')));
      }
      const res = await rt.post(d.restletUrl, collect(action));
      applySaved(res);
      rt.showAlert('ok-alert', label + 'สำเร็จ' + (v.tranid ? ' · ' + v.tranid : ''));
    } catch (err) {
      rt.showAlert('err-alert', label + 'ไม่สำเร็จ: ' + err.message);
    }
  }

  document.getElementById('save-btn').addEventListener('click',    () => submit('save',    'บันทึก'));
  document.getElementById('submit-btn').addEventListener('click',  () => submit('submit',  'ส่งตรวจรับ'));
  document.getElementById('approve-btn').addEventListener('click', () => submit('approve', 'อนุมัติ'));
  document.getElementById('reject-btn').addEventListener('click',  () => submit('reject',  'ตีกลับ'));
  document.getElementById('print-btn').addEventListener('click',   () => window.print());
  document.getElementById('back-btn').addEventListener('click', () => {
    // Direct-link opens have no history to go back to — fall back to the list.
    if (history.length > 1) history.back();
    else if (d.listUrl) location.href = d.listUrl;
  });
</script>
