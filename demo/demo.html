<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TBT-DS · Demo — Purchase Order</title>
  <script>const _t=localStorage.getItem('tbt-theme');if(_t)document.documentElement.dataset.theme=_t;</script>
  <link rel="stylesheet" href="../theme/tbt-theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css">
  <script type="module" src="../components/index.js"></script>
  <style>
    body { margin: 0; }

    /* ── Editable form grid ── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--tbt-space-4);
    }
    @media (max-width: 900px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .form-grid { grid-template-columns: 1fr; } }

    /* Page footer */
    .page-footer {
      display: flex; gap: var(--tbt-space-3); flex-wrap: wrap;
      margin-top: var(--tbt-space-6);
      padding-top: var(--tbt-space-5);
      border-top: 1px solid var(--tbt-border);
    }
  </style>
</head>
<body>

<tbt-app-shell id="shell">

  <!-- ── Menubar ── -->
  <tbt-menubar slot="menubar" title="Teibto ERP">
    <tbt-menu-item label="Icons & SVG" href="icon-svg.html"></tbt-menu-item>
    <tbt-menu-item label="Dashboard" href="#"></tbt-menu-item>
    <tbt-menu-group label="ขาย">
      <tbt-menu-item label="ใบเสนอราคา"  href="#"></tbt-menu-item>
      <tbt-menu-item label="Sales order" href="#"></tbt-menu-item>
    </tbt-menu-group>
    <tbt-menu-group label="จัดซื้อ">
      <tbt-menu-item label="Purchase order" href="#"></tbt-menu-item>
      <tbt-menu-item label="ใบรับสินค้า"    href="#"></tbt-menu-item>
    </tbt-menu-group>
    <tbt-menu-group label="บัญชี">
      <tbt-menu-item label="AP Invoice" href="#"></tbt-menu-item>
      <tbt-menu-item label="Payment"    href="#"></tbt-menu-item>
    </tbt-menu-group>
    <div slot="end" style="display:flex;align-items:center;gap:var(--tbt-space-3)">
      <tbt-icon name="notification" size="lg" color="secondary" style="cursor:pointer"></tbt-icon>
      <tbt-icon name="user"         size="lg" color="secondary" style="cursor:pointer"></tbt-icon>
    </div>
  </tbt-menubar>

  <!-- ── Sidebar ── -->
  <tbt-sidebar slot="sidebar" collapsible>
    <tbt-sidebar-item icon="dashboard"      label="Dashboard"      href="#"></tbt-sidebar-item>
    <tbt-sidebar-item icon="quotation"      label="ใบเสนอราคา"     href="#"></tbt-sidebar-item>
    <tbt-sidebar-item icon="sales-order"    label="Sales order"    href="#"></tbt-sidebar-item>
    <tbt-sidebar-item icon="purchase-order" label="Purchase order" href="#" active></tbt-sidebar-item>
    <tbt-sidebar-item icon="invoice"        label="AP Invoice"     href="#"></tbt-sidebar-item>
    <tbt-sidebar-item icon="payment"        label="Payment"        href="#"></tbt-sidebar-item>
    <tbt-sidebar-item icon="report"         label="Reports"        href="#"></tbt-sidebar-item>
    <tbt-sidebar-item icon="settings"       label="Settings"       href="#"></tbt-sidebar-item>
  </tbt-sidebar>

  <!-- ── Content ── -->
  <main slot="content">

    <!-- Alerts -->
    <tbt-alert id="save-alert"    variant="success" dismissible style="display:none;margin-bottom:var(--tbt-space-4)">Document saved successfully.</tbt-alert>
    <tbt-alert id="approve-alert" variant="info"    dismissible style="display:none;margin-bottom:var(--tbt-space-4)">Document submitted for approval.</tbt-alert>

    <!-- Page header -->
    <tbt-section>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--tbt-space-3)">
        <div>
          <div style="font-size:var(--tbt-size-lg);font-weight:var(--tbt-weight-semibold);color:var(--tbt-text-primary);font-family:var(--tbt-font)">
            Purchase order · <span id="hdr-tranid">PO-2569-0042</span>
          </div>
          <div style="font-size:var(--tbt-size-sm);color:var(--tbt-text-secondary);margin-top:2px;font-family:var(--tbt-font)">
            Created 20 May 2026 by Wichit Wongta
          </div>
        </div>
        <tbt-badge variant="warning" id="doc-status">Pending approval</tbt-badge>
      </div>
    </tbt-section>

    <!-- ── Document info — fully editable ── -->
    <tbt-section title="Document info">
      <div class="form-grid">
        <tbt-input  id="f-tranid"     label="Document no."  value="PO-2569-0042" readonly></tbt-input>
        <tbt-dropdown id="f-vendor"   label="Vendor"        required></tbt-dropdown>
        <tbt-datepicker id="f-date"   label="Date"          value="2026-05-20" required></tbt-datepicker>
        <tbt-datepicker id="f-due"    label="Due date"      value="2026-06-19"></tbt-datepicker>
        <tbt-dropdown id="f-sub"      label="Subsidiary"></tbt-dropdown>
        <tbt-dropdown id="f-dept"     label="Department"></tbt-dropdown>
        <tbt-dropdown id="f-currency" label="Currency"></tbt-dropdown>
        <tbt-input  id="f-memo"       label="Memo"          value="Office supplies Q2/2026"></tbt-input>
      </div>
    </tbt-section>

    <!-- ── Line items — inline editable ── -->
    <tbt-section title="Line items">
      <tbt-button slot="actions" variant="primary" icon="add" size="sm" id="add-line-btn">Add line</tbt-button>
      <tbt-line-items id="line-items" currency="฿" vat-rate="0.07"></tbt-line-items>
    </tbt-section>

    <!-- Approval flow -->
    <tbt-section title="Approval">
      <tbt-approval-flow id="approval-flow" orientation="horizontal"></tbt-approval-flow>
    </tbt-section>

    <!-- Tabs: Audit / Notes -->
    <tbt-section>
      <tbt-subtab>
        <tbt-tab name="audit" label="Audit log">
          <tbt-audit-log id="audit-log" style="margin-top:var(--tbt-space-3)"></tbt-audit-log>
        </tbt-tab>
        <tbt-tab name="notes" label="Notes">
          <div style="padding:var(--tbt-space-4) 0">
            <tbt-input label="Add note" placeholder="Type a note…"></tbt-input>
            <div style="margin-top:var(--tbt-space-3)">
              <tbt-button variant="secondary" size="sm">Add note</tbt-button>
            </div>
          </div>
        </tbt-tab>
      </tbt-subtab>
    </tbt-section>

    <!-- Footer -->
    <div class="page-footer">
      <tbt-button variant="primary"   icon="save"   id="save-btn">Save</tbt-button>
      <tbt-button variant="secondary" icon="submit" id="submit-btn">Submit for approval</tbt-button>
      <tbt-button variant="secondary" icon="print"  id="print-btn">Print</tbt-button>
      <tbt-button variant="secondary" icon="email"  id="email-btn">Email</tbt-button>
      <tbt-button variant="danger"    icon="delete" id="delete-btn">Delete</tbt-button>
    </div>

  </main>
</tbt-app-shell>

<!-- Modals rendered programmatically via confirm() helper -->

<!-- ── Theme toggle ── -->
<button id="theme-toggle" title="Toggle theme" style="
  position:fixed;bottom:var(--tbt-space-5);right:var(--tbt-space-5);
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--tbt-border);background:var(--tbt-bg-card);
  color:var(--tbt-text-secondary);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--tbt-shadow-md);z-index:9999;">
  <i id="theme-icon" class="ti ti-sun"></i>
</button>

<!-- ── Script ── -->
<script type="module">
import { confirm } from '../components/tbt-confirm.js';

/* ── Reference data ── */
const VENDORS = [
  { value:'V001', label:'บจก. เทสโต้ ซัพพลาย จำกัด' },
  { value:'V002', label:'บจก. โปรเทค โซลูชั่น จำกัด' },
  { value:'V003', label:'บจก. ออฟฟิศเมต จำกัด (มหาชน)' },
  { value:'V004', label:'บจก. ซีเอ็นเอ็กซ์ เทรดดิ้ง จำกัด' },
];
const SUBSIDIARIES = [
  { value:'S01', label:'Teibto Co., Ltd.' },
  { value:'S02', label:'Teibto Digital Co., Ltd.' },
];
const DEPARTMENTS = [
  { value:'D01', label:'Operations' },
  { value:'D02', label:'Information Technology' },
  { value:'D03', label:'Finance & Accounting' },
  { value:'D04', label:'Human Resources' },
];
const CURRENCIES = [
  { value:'THB', label:'THB — Thai Baht' },
  { value:'USD', label:'USD — US Dollar' },
  { value:'EUR', label:'EUR — Euro' },
];
const ACCOUNTS = [
  { value:'5100', label:'5100 - Office supplies' },
  { value:'5200', label:'5200 - IT equipment' },
  { value:'5300', label:'5300 - Maintenance' },
  { value:'5400', label:'5400 - Other expenses' },
];
const UNITS = [
  { value:'Pcs', label:'Pcs' },
  { value:'Box', label:'Box' },
  { value:'Set', label:'Set' },
  { value:'Roll', label:'Roll' },
];

/* ── Init header dropdowns ── */
const fVendor = document.getElementById('f-vendor');
const fSub    = document.getElementById('f-sub');
const fDept   = document.getElementById('f-dept');
const fCur    = document.getElementById('f-currency');
fVendor.options = VENDORS;      fVendor.value = 'V001';
fSub.options    = SUBSIDIARIES; fSub.value    = 'S01';
fDept.options   = DEPARTMENTS;  fDept.value   = 'D02';
fCur.options    = CURRENCIES;   fCur.value    = 'THB';

/* ── Line items component ── */
const li = document.getElementById('line-items');
li.accountOptions = ACCOUNTS;
li.unitOptions    = UNITS;
li.rows = [
  { id:1, item:'Dell Laptop 14"',   desc:'i7 16GB 512GB SSD',    qty:5,  unit:'Pcs', price:35000, account:'5200' },
  { id:2, item:'Monitor 27" 4K',    desc:'LG UltraFine 27UN850', qty:5,  unit:'Pcs', price:8500,  account:'5200' },
  { id:3, item:'Office Chair',      desc:'Ergonomic mesh back',  qty:10, unit:'Pcs', price:6800,  account:'5100' },
  { id:4, item:'Printer Paper A4',  desc:'Box of 500 sheets',    qty:50, unit:'Box', price:280,   account:'5100' },
  { id:5, item:'USB-C Hub 7-port',  desc:'Multi-port adapter',   qty:20, unit:'Pcs', price:890,   account:'5200' },
];

let grandTotal = li.getTotal().total;
li.addEventListener('tbt-change', e => { grandTotal = e.detail.total; });

document.getElementById('add-line-btn').addEventListener('click', () => li.addRow());

/* ── Approval flow ── */
document.getElementById('approval-flow').steps = [
  { id:'1', label:'Request',  approver:'Wichit Wongta',  status:'approved', timestamp: new Date(Date.now()-2*86400000).toISOString() },
  { id:'2', label:'Manager',  approver:'Somchai Kaewpan', status:'current' },
  { id:'3', label:'Director', approver:'Apinya Sritong',  status:'pending' },
  { id:'4', label:'Finance',  approver:'Kanlaya Rodchai', status:'pending' },
];

/* ── Audit log ── */
document.getElementById('audit-log').entries = [
  { id:'4', timestamp:new Date(Date.now()-1*3600000).toISOString(), user:'System',        action:'submitted', label:'Submitted for approval' },
  { id:'3', timestamp:new Date(Date.now()-2*3600000).toISOString(), user:'Wichit Wongta', action:'updated',   label:'Amount updated',
    changes:[{field:'Grand total', from:'฿340,000.00', to:'฿362,131.50'}] },
  { id:'2', timestamp:new Date(Date.now()-3*3600000).toISOString(), user:'Wichit Wongta', action:'updated',   label:'Line items updated',
    changes:[{field:'Lines', from:'4 items', to:'5 items'}] },
  { id:'1', timestamp:new Date(Date.now()-5*3600000).toISOString(), user:'Wichit Wongta', action:'created',   label:'Document created' },
];

/* ── Save ── */
document.getElementById('save-btn').addEventListener('click', () => {
  const btn = document.getElementById('save-btn');
  btn.loading = true; btn.textContent = 'Saving…';
  setTimeout(() => {
    btn.loading = false; btn.textContent = 'Save';
    const a = document.getElementById('save-alert');
    a.style.display = '';
    setTimeout(() => { a.style.display = 'none'; }, 4000);
  }, 1200);
});

/* ── Submit ── */
document.getElementById('submit-btn').addEventListener('click', async () => {
  const fmt = v => v.toLocaleString('th-TH', { minimumFractionDigits:2, maximumFractionDigits:2 });
  const ok = await confirm({
    title: 'Submit for approval',
    message: `Submit <strong>PO-2569-0042</strong> (฿${fmt(grandTotal)}) for manager approval?`,
    confirmLabel: 'Submit',
    variant: 'confirm',
  });
  if (ok) {
    document.getElementById('doc-status').variant = 'info';
    document.getElementById('doc-status').textContent = 'In review';
    const a = document.getElementById('approve-alert');
    a.style.display = '';
    setTimeout(() => { a.style.display = 'none'; }, 4000);
  }
});

/* ── Delete ── */
document.getElementById('delete-btn').addEventListener('click', async () => {
  const ok = await confirm({
    title: 'Delete document',
    message: 'Are you sure you want to delete <strong>PO-2569-0042</strong>? This action cannot be undone.',
    confirmLabel: 'Delete',
    variant: 'danger',
  });
  if (ok) {
    document.getElementById('doc-status').variant = 'danger';
    document.getElementById('doc-status').textContent = 'Deleted';
  }
});

/* ── Print ── */
document.getElementById('print-btn').addEventListener('click', () => window.print());

/* ── Theme toggle ── */
const themeBtn  = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  themeIcon.className = t === 'dark' ? 'ti ti-moon' : 'ti ti-sun';
  localStorage.setItem('tbt-theme', t);
}
applyTheme(localStorage.getItem('tbt-theme') ||
  (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeBtn.addEventListener('click', () =>
  applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'));

</script>
</body>
</html>
